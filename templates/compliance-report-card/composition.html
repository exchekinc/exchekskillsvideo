<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>ExChek Compliance Report Card</title>
<!-- @hf-styles -->
<style>
  .grade-display {
    position: absolute;
    left: 80px;
    top: 470px;
    width: 540px;
    height: 420px;
    border-radius: var(--radius-lg);
    background: var(--accent-soft);
    border: 1px solid #DCC9FF;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    box-shadow: var(--shadow-strong);
  }
  .grade-display .grade {
    font-family: var(--font-display);
    font-size: 280px;
    font-weight: 700;
    line-height: 1;
    color: var(--accent);
    letter-spacing: -0.04em;
  }
  .grade-display .cap {
    font-size: 18px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--accent); margin-top: 8px; font-weight: 600;
  }
  .scores {
    position: absolute;
    left: 660px;
    top: 470px;
    right: 80px;
    height: 420px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
  }
  .scores .card { padding: 22px 26px; min-height: 0; }
  .scores .card .label { font-size: 12px; }
  .scores .card .value { font-size: 36px; }
  .scores .bar { margin-top: 14px; height: 8px; border-radius: 6px; background: var(--surface-muted); overflow: hidden; }
  .scores .bar .fill { display: block; height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--accent-tint)); transform-origin: left; }
</style>
</head>
<body>

<div id="root"
     data-composition-id="compliance-report-card"
     data-start="0"
     data-width="1920"
     data-height="1080"
     class="stage">

  <div id="grid" class="clip grid-overlay" data-start="0" data-duration="30" data-track-index="0"></div>

  <header id="brand" class="clip brand-bar fadein" data-start="0" data-duration="30" data-track-index="1">
    <div class="brand-mark">
      <!-- @hf-logo -->
      <span class="product">Compliance Report Card</span>
    </div>
    <div class="meta"><span>generated: {{meta.generatedAtPretty}}</span></div>
  </header>

  <div id="eyebrow" class="clip eyebrow fadein" data-start="0.2" data-duration="30" data-track-index="2"
       style="top: 200px;">
    Export compliance · Periodic review
  </div>

  <h1 id="headline" class="clip headline fadein" data-start="0.35" data-duration="30" data-track-index="3"
      style="top: 246px; font-size: 80px;">
    Compliance Report Card
  </h1>

  <div id="grade" class="clip grade-display fadein" data-start="0.9" data-duration="30" data-track-index="5">
    <div class="grade" id="gradeValue">—</div>
    <div class="cap">overall grade</div>
  </div>

  <div id="scores" class="clip scores stagger" data-start="1.4" data-duration="30" data-track-index="6"></div>

  <footer id="disclose" class="clip disclosure fadein" data-start="2.8" data-duration="30" data-track-index="7">
    <div class="lhs">
      <span class="ai-warn">{{brand.aiDisclaimer}}</span>
      {{brand.disclosure}}
    </div>
    <div class="rhs">{{meta.platform}} · {{meta.model}}</div>
  </footer>

  <!-- @hf-data -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script>
    (function () {
      var d = window.__hfData || {};
      var dets = d.determinations || [];
      var grade = (dets.find(function(x){ return /grade|overall/i.test(x.label || ""); }) || {}).value || (dets[0] && dets[0].value) || "—";
      document.getElementById("gradeValue").textContent = String(grade);

      var scoresRoot = document.getElementById("scores");
      dets.slice(0, 4).forEach(function (det) {
        var pct = typeof det.confidence === "number" ? Math.max(0, Math.min(1, det.confidence)) : 0.7;
        var card = document.createElement("div");
        card.className = "card";
        card.innerHTML =
          '<div class="label">' + escapeHtml(det.label || "Score") + '</div>' +
          '<div class="value">' + escapeHtml(det.value || "—") + '</div>' +
          '<div class="bar"><span class="fill" data-pct="' + pct + '"></span></div>';
        scoresRoot.appendChild(card);
      });
      function escapeHtml(s) {
        return String(s == null ? "" : s)
          .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
      }

      var tl = gsap.timeline({ paused: true });
      tl.to("#brand",    { opacity: 1, y: 0, duration: 0.5 }, 0.0);
      tl.to("#eyebrow",  { opacity: 1, y: 0, duration: 0.6, ease: "power3.out" }, 0.2);
      tl.to("#headline", { opacity: 1, y: 0, duration: 0.7, ease: "power3.out" }, 0.35);
      tl.from("#grade .grade", { scale: 0.6, duration: 0.9, ease: "back.out(1.7)" }, 0.9);
      tl.to("#grade",   { opacity: 1, y: 0, duration: 0.6 }, 0.9);
      tl.to("#scores",  { opacity: 1, y: 0, duration: 0.6, ease: "power2.out" }, 1.4);
      tl.to("#scores > *", { opacity: 1, y: 0, duration: 0.5, stagger: 0.12 }, 1.5);
      Array.from(document.querySelectorAll("#scores .bar .fill")).forEach(function (el, i) {
        var pct = parseFloat(el.dataset.pct || "0.7");
        tl.to(el, { width: (pct * 100).toFixed(1) + "%", duration: 0.8, ease: "power3.out" }, 1.8 + i * 0.12);
      });
      tl.to("#disclose", { opacity: 1, y: 0, duration: 0.5 }, 2.8);
      tl.set({}, {}, 9.0);

      window.__timelines = window.__timelines || {};
      window.__timelines["compliance-report-card"] = tl;

      var a = (window.__hfData || {}).audio;
      if (a && a.enabled && a.duration > 9) {
        tl.set({}, {}, Math.ceil(a.duration * 10) / 10);
      }
    })();
  </script>
  <!-- @hf-audio -->
</div>
</body>
</html>
