<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>ExChek Compliance Training</title>
<!-- @hf-styles -->
<style>
  .lesson-num {
    position: absolute;
    left: 80px;
    top: 200px;
    font-family: var(--font-mono);
    font-size: 18px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
  }
  .lesson-title {
    position: absolute;
    left: 80px;
    right: 80px;
    top: 246px;
    font-family: var(--font-display);
    font-size: 88px;
    font-weight: 700;
    letter-spacing: -0.025em;
    line-height: 1.0;
    color: var(--text);
  }
  .lesson-body {
    position: absolute;
    left: 80px;
    right: 80px;
    top: 500px;
    bottom: 130px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }
  .key-points { padding: 28px 32px; }
  .citation-card { padding: 28px 32px; }
  .key-points li { font-size: 24px; }
  .citation-card .row { font-size: 18px; }
</style>
</head>
<body>

<div id="root"
     data-composition-id="training"
     data-start="0"
     data-width="1920"
     data-height="1080"
     class="stage">

  <div id="grid" class="clip grid-overlay" data-start="0" data-duration="30" data-track-index="0"></div>

  <header id="brand" class="clip brand-bar fadein" data-start="0" data-duration="30" data-track-index="1">
    <div class="brand-mark">
      <!-- @hf-logo -->
      <span class="product">Compliance Training</span>
    </div>
    <div class="meta"><span>generated: {{meta.generatedAtPretty}}</span></div>
  </header>

  <div id="lessonNum" class="clip lesson-num fadein" data-start="0.2" data-duration="30" data-track-index="2">
    Lesson · {{meta.skill}}
  </div>

  <h1 id="lessonTitle" class="clip lesson-title fadein" data-start="0.4" data-duration="30" data-track-index="3">
    {{headline}}
  </h1>

  <div id="lessonBody" class="clip lesson-body" data-start="1.0" data-duration="30" data-track-index="4">
    <section id="kp" class="card key-points fadein">
      <div class="label">Key points</div>
      <ul id="kpList" class="list stagger" style="margin-top: 12px;"></ul>
    </section>
    <section id="cc" class="card citation-card fadein">
      <div class="label">Where this rule lives</div>
      <div class="citations stagger" id="ccList" style="margin-top: 14px;"></div>
      <div class="label" style="margin-top: 22px;">What to do next</div>
      <ul id="actList" class="list stagger" style="margin-top: 8px;"></ul>
    </section>
  </div>

  <footer id="disclose" class="clip disclosure fadein" data-start="3.0" data-duration="30" data-track-index="5">
    <div class="lhs">
      <span class="ai-warn">{{brand.aiDisclaimer}}</span>
      {{brand.disclosure}}
    </div>
    <div class="rhs">{{meta.platform}} · {{meta.model}}</div>
  </footer>

  <!-- @hf-data -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script>
    (function () {
      var d = window.__hfData || {};
      var ev = window.ExChekVideo;

      var keypoints = (d.determinations || []).slice(0, 4).map(function (x) {
        return { label: x.label, detail: x.value };
      });
      ev.fillList("#kpList", keypoints, function (it) {
        return '<span class="marker"></span><div class="body"><div class="title">' +
               escape(it.label) + '</div><div class="detail">' + escape(it.detail) + '</div></div>';
      });

      var ccRoot = document.getElementById("ccList");
      (d.citations || []).slice(0, 4).forEach(function (c) {
        var row = document.createElement("div");
        row.className = "row";
        row.innerHTML = '<span class="cfr">' + escape(c.cfr) + '</span><span>pulled ' + escape((d.meta && d.meta.ecfrPulledAtPretty) || c.pulled_at || "—") + '</span>';
        ccRoot.appendChild(row);
      });

      var actions = (d.actions || []).slice(0, 3).map(function (a) { return { label: a }; });
      ev.fillList("#actList", actions, function (it) {
        return '<span class="marker"></span><div class="body"><div class="title">' + escape(it.label) + '</div></div>';
      });

      function escape(s) {
        return String(s == null ? "" : s)
          .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
      }

      var tl = gsap.timeline({ paused: true });
      tl.to("#brand",       { opacity: 1, y: 0, duration: 0.5 }, 0.0);
      tl.to("#lessonNum",   { opacity: 1, y: 0, duration: 0.5 }, 0.2);
      tl.to("#lessonTitle", { opacity: 1, y: 0, duration: 0.7, ease: "power3.out" }, 0.4);
      tl.to("#kp",          { opacity: 1, y: 0, duration: 0.6, ease: "power2.out" }, 1.0);
      tl.to("#kp .stagger > *", { opacity: 1, y: 0, duration: 0.5, stagger: 0.16 }, 1.2);
      tl.to("#cc",          { opacity: 1, y: 0, duration: 0.6, ease: "power2.out" }, 1.6);
      tl.to("#cc .stagger > *", { opacity: 1, y: 0, duration: 0.5, stagger: 0.12 }, 1.8);
      tl.to("#disclose",    { opacity: 1, y: 0, duration: 0.5 }, 3.0);
      tl.set({}, {}, 12.0);

      window.__timelines = window.__timelines || {};
      window.__timelines["training"] = tl;

      var a = (window.__hfData || {}).audio;
      if (a && a.enabled && a.duration > 12) {
        tl.set({}, {}, Math.ceil(a.duration * 10) / 10);
      }
    })();
  </script>
  <!-- @hf-audio -->
</div>
</body>
</html>
