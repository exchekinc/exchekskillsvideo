<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>ExChek Red Flag Assessment</title>
<!-- @hf-styles -->
<style>
  .alert-bar {
    position: absolute;
    top: 134px;
    left: 80px;
    right: 80px;
    height: 4px;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--danger), var(--warn));
    transform-origin: left center;
  }
  .flag-grid {
    position: absolute;
    left: 80px;
    right: 80px;
    top: 460px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
  }
  .flag-card { position: relative; padding: 28px 32px; min-height: 200px; overflow: hidden; }
  .flag-card .sev {
    position: absolute;
    top: 24px; right: 28px;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 4px;
  }
  .flag-card.flag-high   .sev { color: #B91C1C; background: #FEF2F2; border: 1px solid #FECACA; }
  .flag-card.flag-medium .sev { color: #B45309; background: #FFFBEB; border: 1px solid #FDE68A; }
  .flag-card.flag-low    .sev { color: #047857; background: #ECFDF5; border: 1px solid #A7F3D0; }
  .flag-card .title { font-family: var(--font-display); font-size: 28px; font-weight: 700; margin-top: 8px; color: var(--text); letter-spacing: -0.01em; }
  .flag-card .detail {
    color: var(--text-muted); font-size: 18px; margin-top: 12px; line-height: 1.45;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
  }
</style>
</head>
<body>

<div id="root"
     data-composition-id="red-flag"
     data-start="0"
     data-width="1920"
     data-height="1080"
     class="stage">

  <div id="grid" class="clip grid-overlay" data-start="0" data-duration="9" data-track-index="0"></div>
  <div id="alertBar" class="clip alert-bar" data-start="0.0" data-duration="9" data-track-index="1" style="transform: scaleX(0);"></div>

  <header id="brand" class="clip brand-bar fadein" data-start="0" data-duration="9" data-track-index="2">
    <div class="brand-mark">
      <!-- @hf-logo -->
      <span class="product">Red-Flag Assessment</span>
    </div>
    <div class="meta">
      <span>skill: {{meta.skill}}</span>
      <span>generated: {{meta.generatedAtPretty}}</span>
    </div>
  </header>

  <div id="eyebrow" class="clip eyebrow fadein" data-start="0.3" data-duration="9" data-track-index="3"
       style="top: 200px; color: var(--danger);">
    Export compliance · BIS Supp. 3 to 15 CFR Part 732
  </div>

  <h1 id="headline" class="clip headline fadein" data-start="0.45" data-duration="9" data-track-index="4"
      style="top: 246px; font-size: 80px; line-height: 1.0; color: var(--danger);">
    {{headline}}
  </h1>

  <div id="subhead" class="clip subhead fadein" data-start="0.65" data-duration="9" data-track-index="5"
       style="top: 350px; max-width: 1500px;">
    {{subhead}}
  </div>

  <div id="grid2" class="clip flag-grid stagger" data-start="1.2" data-duration="9" data-track-index="6"></div>

  <footer id="disclose" class="clip disclosure fadein" data-start="2.8" data-duration="9" data-track-index="7">
    <div class="lhs">{{brand.disclosure}}</div>
    <div class="rhs">{{meta.platform}} · {{meta.model}}</div>
  </footer>

  <!-- @hf-data -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script>
    (function () {
      var d = window.__hfData || {};
      var grid = document.getElementById("grid2");
      var flags = (d.flags || []).slice(0, 4);
      flags.forEach(function (f) {
        var card = document.createElement("div");
        card.className = "card flag-card flag-" + (f.severity || "info");
        card.innerHTML =
          '<div class="sev">' + escapeHtml((f.severity || "info").toUpperCase()) + '</div>' +
          '<div class="label">Indicator</div>' +
          '<div class="title">' + escapeHtml(f.label || "") + '</div>' +
          '<div class="detail">' + escapeHtml(f.detail || "") + '</div>';
        grid.appendChild(card);
      });
      function escapeHtml(s) {
        return String(s == null ? "" : s)
          .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
      }

      var tl = gsap.timeline({ paused: true });
      tl.to("#alertBar", { scaleX: 1, duration: 0.7, ease: "expo.out" }, 0.0);
      tl.to("#brand",    { opacity: 1, y: 0, duration: 0.5 }, 0.0);
      tl.to("#eyebrow",  { opacity: 1, y: 0, duration: 0.6, ease: "power3.out" }, 0.3);
      tl.to("#headline", { opacity: 1, y: 0, duration: 0.7, ease: "power3.out" }, 0.45);
      tl.to("#subhead",  { opacity: 1, y: 0, duration: 0.6 }, 0.65);
      tl.to("#grid2 > *", { opacity: 1, y: 0, duration: 0.5, ease: "power2.out", stagger: 0.16 }, 1.2);
      tl.to("#disclose", { opacity: 1, y: 0, duration: 0.5 }, 2.8);
      tl.set({}, {}, 9.0);

      window.__timelines = window.__timelines || {};
      window.__timelines["red-flag"] = tl;

      var a = (window.__hfData || {}).audio;
      if (a && a.enabled && a.duration > 9) {
        tl.set({}, {}, Math.ceil(a.duration * 10) / 10);
      }
    })();
  </script>
  <!-- @hf-audio -->
</div>
</body>
</html>
